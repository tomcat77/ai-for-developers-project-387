name: Lighthouse With OpenCode
on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  lhci:
    name: Lighthouse CI + OpenCode
    runs-on: ubuntu-latest
    permissions:
      id-token: write    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Compose services
        run: docker compose build
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.x

      - name: Run OpenCode Performance Analysis
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/minimax-m2.5
          prompt: |
            Run a performance audit for the main pages of the application.
            If overall performance is poor, create an issue
            with specific recommendations for improvement.          
      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down --volumes --remove-orphans
