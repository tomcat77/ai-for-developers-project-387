<div class="slot-picker">
  <h4 class="slots-title">Доступное время</h4>

  <div *ngIf="loading" class="loading">
    <mat-spinner diameter="32"></mat-spinner>
  </div>

  <div *ngIf="!loading && slots.length === 0" class="no-slots">
    <mat-icon>event_busy</mat-icon>
    <span>Нет доступных слотов на эту дату</span>
  </div>

  <mat-selection-list *ngIf="!loading && slots.length > 0" class="slots-list">
    <mat-list-option
      *ngFor="let slot of slots"
      [selected]="isSelected(slot)"
      [disabled]="isDisabled(slot)"
      (click)="selectSlot(slot)"
      class="slot-item"
      [class.slot-disabled]="isDisabled(slot)">
      <mat-icon matListItemIcon>{{ isDisabled(slot) ? 'event_busy' : 'schedule' }}</mat-icon>
      <span matListItemTitle>
        {{ formatTime(slot) }}
        <span *ngIf="isDisabled(slot)" class="slot-status">(Занято)</span>
      </span>
    </mat-list-option>
  </mat-selection-list>
</div>
