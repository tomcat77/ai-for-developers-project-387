<ng-container *ngIf="loading()">
  <div class="loading-screen">
    <mat-spinner diameter="48"></mat-spinner>
  </div>
</ng-container>

<ng-container *ngIf="!loading() && eventType && !successBooking">
  <ng-container *ngIf="step() === 'select' || step() === null">
    <mat-toolbar color="primary" class="header">
      <button mat-icon-button (click)="goToCatalog()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <span>Запись на звонок</span>
    </mat-toolbar>

    <div class="content">
      <app-event-type-summary
        [eventType]="eventType"
        [selectedDate]="selectedDate"
        [selectedSlot]="selectedSlot()">
      </app-event-type-summary>

      <app-booking-slot-step
        [eventType]="eventType"
        [selectedDate]="selectedDate"
        [selectedSlot]="selectedSlot()"
        (dateSelect)="onDateSelect($event)"
        (slotSelect)="onSlotSelect($event)">
      </app-booking-slot-step>

      <div class="actions">
        <button 
          mat-raised-button 
          color="primary" 
          (click)="proceedToConfirm()"
          [disabled]="!canProceed()">
          Продолжить
        </button>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="step() === 'confirm'">
    <app-guest-info-step
      [eventType]="eventType"
      [selectedDate]="selectedDate"
      [selectedSlot]="selectedSlot()"
      (back)="goBack()"
      (booked)="onBooked($event)">
    </app-guest-info-step>
  </ng-container>
</ng-container>

<ng-container *ngIf="successBooking">
  <div class="success-screen">
    <mat-card class="success-card">
      <mat-card-content>
        <mat-icon class="success-icon">check_circle</mat-icon>
        <h2>Бронирование создано!</h2>
        <p>Вы успешно записались на звонок.</p>
        <p class="details">
          {{ successBooking.startTime | date:'dd.MM.yyyy HH:mm' }}
        </p>
        <div class="actions">
          <button mat-stroked-button (click)="goToCatalog()">
            Записаться ещё раз
          </button>
          <button mat-raised-button color="primary" (click)="goHome()">
            На главную
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</ng-container>
