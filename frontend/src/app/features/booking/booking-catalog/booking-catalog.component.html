<mat-toolbar color="primary" class="header">
  <button mat-icon-button (click)="router.navigate(['/'])">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <span class="logo">Calendar</span>
  <span class="spacer"></span>
  <button mat-button (click)="router.navigate(['/admin/calendar'])">Админка</button>
</mat-toolbar>

<div class="content">
  <ng-container *ngIf="owner">
    <div class="owner-profile">
      <div class="avatar">{{ owner.name.charAt(0).toUpperCase() }}</div>
      <div class="owner-info">
        <span class="name">{{ owner.name }}</span>
        <span class="role">Host</span>
      </div>
    </div>
  </ng-container>

  <h2 class="title">Выберите тип события</h2>
  <p class="subtitle">Продолжительность звонка и описание</p>

  <div *ngIf="loading()" class="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading() && !error" class="event-types-grid">
    <mat-card 
      *ngFor="let eventType of eventTypes" 
      class="event-type-card"
      (click)="selectEventType(eventType)">
      <mat-card-header>
        <mat-card-title>{{ eventType.name }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="description">{{ eventType.description }}</p>
        <mat-chip class="duration-chip">
          <mat-icon>schedule</mat-icon>
          {{ eventType.durationMinutes }} мин
        </mat-chip>
      </mat-card-content>
    </mat-card>
  </div>

  <div *ngIf="!loading() && eventTypes.length === 0" class="empty-state">
    <p>Нет доступных типов событий</p>
  </div>
</div>
