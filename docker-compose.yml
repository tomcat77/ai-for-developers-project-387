services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calls-calendar-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - calls-calendar-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calls-calendar-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - calls-calendar-network

networks:
  calls-calendar-network:
    driver: bridge
